baseURL = "https://aerocommons.org/"
languageCode = "en-us"
title = "AeroCommons"

[params]
  gaID = "G-F3VK4VR7MP"
  description = "Open-source experimental aircraft development. The MAOS is a four-seat, series-hybrid, IFR-capable aircraft designed for homebuilders."
  github = "https://github.com/billmallard/aerocommons"
  email = "contact@aerocommons.org"
  tagline = "Open Source Experimental Aviation"
  show_announcement = true

[taxonomies]
  tag = "tags"
  author = "authors"
  project = "project"
  article_type = "article_type"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = false
  [markup.highlight]
    style = "monokai"
    noClasses = true

[outputFormats]
  [outputFormats.RSS]
    mediaType = "application/rss+xml"
    baseName = "feed"

  [outputFormats.LLMS]
    mediaType = "text/plain"
    baseName = "llms"
    isPlainText = true
    notAlternative = true

  [outputFormats.LLMSFull]
    mediaType = "text/plain"
    baseName = "llms-full"
    isPlainText = true
    notAlternative = true

[outputs]
  home = ["HTML", "RSS", "LLMS", "LLMSFull"]
  section = ["HTML", "RSS"]
  page = ["HTML"]
