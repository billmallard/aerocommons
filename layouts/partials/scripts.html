<script>
// ── REVEAL ON SCROLL ──
const revealObserver = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.classList.add('visible');
      revealObserver.unobserve(entry.target);
    }
  });
}, { threshold: 0.08, rootMargin: '0px 0px -40px 0px' });

document.querySelectorAll('.reveal').forEach(el => revealObserver.observe(el));

// Trigger hero reveals immediately
document.querySelectorAll('#hero .reveal, .page-hero .reveal').forEach((el, i) => {
  setTimeout(() => el.classList.add('visible'), 80 + i * 100);
});

// ── AGENT PILL INTERACTIVITY ──
(function() {
  const pills = document.querySelectorAll('.agent-pill[data-desc]');
  const desc = document.querySelector('.ai-board-desc');
  if (!pills.length || !desc) return;

  const defaultDesc = desc.textContent;
  let activePill = document.querySelector('.agent-pill.chairman');

  pills.forEach(pill => {
    pill.addEventListener('mouseenter', () => {
      desc.style.opacity = '0';
      setTimeout(() => {
        desc.textContent = pill.dataset.desc;
        desc.style.opacity = '1';
      }, 150);
      pills.forEach(p => p.classList.remove('active'));
      pill.classList.add('active');
    });

    pill.addEventListener('click', () => {
      activePill = pill;
      pills.forEach(p => p.classList.remove('active'));
      pill.classList.add('active');
      desc.textContent = pill.dataset.desc;
    });
  });

  const board = document.querySelector('.ai-board');
  if (board) {
    board.addEventListener('mouseleave', () => {
      pills.forEach(p => p.classList.remove('active'));
      if (activePill) activePill.classList.add('active');
      desc.style.opacity = '0';
      setTimeout(() => {
        desc.textContent = activePill ? activePill.dataset.desc : defaultDesc;
        desc.style.opacity = '1';
      }, 150);
    });
  }
})();

// ── NAV HAMBURGER ──
const hamburger = document.getElementById('hamburger');
const navLinks  = document.getElementById('nav-links');

if (hamburger && navLinks) {
  hamburger.addEventListener('click', () => {
    const open = navLinks.classList.toggle('open');
    hamburger.setAttribute('aria-expanded', open);
  });
  navLinks.querySelectorAll('.nav-link').forEach(link => {
    link.addEventListener('click', () => {
      navLinks.classList.remove('open');
      hamburger.setAttribute('aria-expanded', 'false');
    });
  });
}

// ── ACTIVE NAV (home only) ──
const sections = document.querySelectorAll('section[id]');
const navLinkEls = document.querySelectorAll('.nav-link');

if (sections.length) {
  const navObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        const id = entry.target.getAttribute('id');
        navLinkEls.forEach(link => {
          const href = link.getAttribute('href');
          link.style.color = (href === '#' + id || href === '/#' + id)
            ? 'rgba(243,240,233,0.9)'
            : '';
        });
      }
    });
  }, { threshold: 0.4 });
  sections.forEach(s => navObserver.observe(s));
}
</script>
