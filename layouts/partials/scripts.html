<script>
// ── REVEAL ON SCROLL ──
const revealObserver = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.classList.add('visible');
      revealObserver.unobserve(entry.target);
    }
  });
}, { threshold: 0.08, rootMargin: '0px 0px -40px 0px' });

document.querySelectorAll('.reveal').forEach(el => revealObserver.observe(el));

// Trigger hero reveals immediately
document.querySelectorAll('#hero .reveal, .page-hero .reveal').forEach((el, i) => {
  setTimeout(() => el.classList.add('visible'), 80 + i * 100);
});

// ── AGENT PILL INTERACTIVITY ──
(function() {
  const pills = document.querySelectorAll('.agent-pill[data-desc]');
  const desc = document.querySelector('.ai-board-desc');
  if (!pills.length || !desc) return;

  let lockedPill = document.querySelector('.agent-pill.chairman');

  function showDesc(pill) {
    desc.style.opacity = '0';
    setTimeout(function() {
      desc.textContent = pill.dataset.desc;
      desc.style.opacity = '1';
    }, 150);
  }

  function setVisual(pill) {
    pills.forEach(function(p) {
      p.classList.remove('active');
      p.classList.remove('chairman');
    });
    pill.classList.add('active');
  }

  pills.forEach(function(pill) {
    pill.addEventListener('mouseenter', function() {
      setVisual(pill);
      showDesc(pill);
    });

    pill.addEventListener('click', function(e) {
      e.preventDefault();
      lockedPill = pill;
      setVisual(pill);
      desc.textContent = pill.dataset.desc;
      desc.style.opacity = '1';
    });
  });

  var board = document.querySelector('.ai-board');
  if (board) {
    board.addEventListener('mouseleave', function() {
      if (lockedPill) {
        setVisual(lockedPill);
        showDesc(lockedPill);
      }
    });
  }
})();

// ── NAV HAMBURGER ──
const hamburger = document.getElementById('hamburger');
const navLinks  = document.getElementById('nav-links');

if (hamburger && navLinks) {
  hamburger.addEventListener('click', () => {
    const open = navLinks.classList.toggle('open');
    hamburger.setAttribute('aria-expanded', open);
  });
  navLinks.querySelectorAll('.nav-link').forEach(link => {
    link.addEventListener('click', () => {
      navLinks.classList.remove('open');
      hamburger.setAttribute('aria-expanded', 'false');
    });
  });
}

// ── ACTIVE NAV (home only) ──
const sections = document.querySelectorAll('section[id]');
const navLinkEls = document.querySelectorAll('.nav-link');

if (sections.length) {
  const navObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        const id = entry.target.getAttribute('id');
        navLinkEls.forEach(link => {
          const href = link.getAttribute('href');
          link.style.color = (href === '#' + id || href === '/#' + id)
            ? 'rgba(243,240,233,0.9)'
            : '';
        });
      }
    });
  }, { threshold: 0.4 });
  sections.forEach(s => navObserver.observe(s));
}
</script>
